name: build-and-deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # CI on every push: quality gates + production build.
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm test
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  # Deploys the built site. This job fails harmlessly until GitHub Pages is
  # enabled in repo settings (Settings -> Pages -> Source: GitHub Actions) —
  # enabling it is the single manual flip; the next push (or a re-run of the
  # latest workflow) then publishes automatically.
  deploy:
    needs: build
    runs-on: ubuntu-latest
    # Tolerated until Pages is enabled in repo settings; once flipped, deploys
    # publish automatically and real failures still surface as annotations.
    continue-on-error: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
